apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api-unipds
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-api-unipds
  template:
    metadata:
      labels:
        app: nexus-api-unipds
    spec:
      containers:
      - name: nexus-api-unipds
        image: nginx:latest
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-api-unipds-svc
spec:
  selector:
    app: nexus-api-unipds
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
